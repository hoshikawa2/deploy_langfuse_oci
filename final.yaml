#                  name: langfuse-secret
#                  key: oci-access-key
#
#            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
#              valueFrom:
#                secretKeyRef:
#                  name: langfuse-secret
#                  key: oci-secret-key

            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"

            # ===== EXPORT =====
            - name: LANGFUSE_S3_BATCH_EXPORT_ENABLED
              value: "true"

            - name: LANGFUSE_S3_BATCH_EXPORT_BUCKET
              value: "langfuse-exports"

            - name: LANGFUSE_S3_BATCH_EXPORT_REGION
              value: "us-ashburn-1"

            - name: LANGFUSE_S3_BATCH_EXPORT_ENDPOINT
              value: "https://xxxxxxxxxxx.compat.objectstorage.us-ashburn-1.oraclecloud.com"

#            - name: LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID
#              valueFrom:
#                secretKeyRef:
#                  name: langfuse-secret
#                  key: oci-access-key
#
#            - name: LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY
#              valueFrom:
#                secretKeyRef:
#                  name: langfuse-secret
#                  key: oci-secret-key

            - name: LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE
              value: "true"
          resources:
            requests:
              cpu: "50m"
              memory: "2Gi"
            limits:
              cpu: "512m"
              memory: "3Gi"
---
# ===== LANGFUSE SERVICE =====

apiVersion: v1
kind: Service
metadata:
  name: langfuse-web
  namespace: langfuse
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-internal: "true"
    oci.oraclecloud.com/healthcheck-path: "/api/public/health"
    oci.oraclecloud.com/healthcheck-port: "3000"
spec:
  type: LoadBalancer
  selector:
    app: langfuse
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
# ===== LANGFUSE HPA - HORIZONTAL POD AUTOSCALER =====

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: langfuse-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: langfuse
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ===== WORKER - AUTOSCALER =====
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: langfuse-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: langfuse-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-lb
  namespace: langfuse
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    oci.oraclecloud.com/healthcheck-path: "/api/public/health"
spec:
  type: LoadBalancer
  selector:
    app: langfuse
  ports:
    - port: 80
      targetPort: 3000